<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة حمدي محب | الشاشة الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; font-family: 'Cairo', sans-serif; background: #0f0f0f; }

        /* شاشة التحميل الاحترافية */
        #loader-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease, visibility 1s;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(to right, #d4af37, #f2d06b, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(212, 175, 55, 0.1);
            border-top: 4px solid #d4af37;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* إطار الموقع (Iframe) */
        #site-frame {
            width: 100%;
            height: 100vh;
            border: none;
            display: none; /* مخفي في البداية */
        }
    </style>
</head>
<body>

    <div id="loader-screen">
        <div class="container">
            <div class="spinner"></div>
            <h1>الدخول لمكتبة حمدى محب</h1>
            <p style="color: #888; font-size: 0.9rem; letter-spacing: 1px;">جاري تحضير المكتبة...</p>
        </div>
    </div>

    <iframe id="site-frame" src="https://hamdy-moheb.odoo.com" allowfullscreen></iframe>

    <script>
        window.onload = function() {
            // هنستنى 4 ثواني عشان ندي فرصة للتصميم يظهر
            setTimeout(() => {
                const loader = document.getElementById('loader-screen');
                const frame = document.getElementById('site-frame');

                // إخفاء شاشة التحميل
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';

                // إظهار الموقع
                frame.style.display = 'block';
            }, 4000);
        };
    </script>

</body>
</html>
